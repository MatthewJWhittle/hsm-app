# Deploy dev Hosting (hsm-dashboard-dev → api-staging) on merge to main after CI.
# Prod Hosting (hsm-dashboard → api-prod) deploys on GitHub Release — see deploy-prod.yml (after api-prod).

name: Deploy Firebase Hosting (dev) on merge
on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
jobs:
  build_and_deploy:
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.head_branch == 'main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_USE_AUTH_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: hsm-dashboard
          VITE_FIREBASE_AUTH_DOMAIN: hsm-dashboard.firebaseapp.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npm ci && npm run build
      - name: Deploy Hosting (dev → api-staging)
        uses: FirebaseExtended/action-hosting-deploy@73212fc153444869d3e433816aab02624792fcef # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HSM_DASHBOARD }}
          channelId: live
          projectId: hsm-dashboard
          target: dev
