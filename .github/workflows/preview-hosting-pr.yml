# Preview deploy for PRs (Vite build from frontend/).

name: Preview Hosting (PR)

on: pull_request

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build_and_preview:
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_USE_AUTH_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: hsm-dashboard
          VITE_FIREBASE_AUTH_DOMAIN: hsm-dashboard.firebaseapp.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_API_BASE: ${{ vars.PREVIEW_API_BASE_URL }}
          VITE_TITILER_URL: ${{ vars.TITILER_PUBLIC_URL || 'https://titiler-shared-t566ee45iq-uc.a.run.app' }}
        run: npm ci && npm run build
      - name: Use preview-safe Firebase Hosting config
        run: |
          jq '
            .hosting |= map(
              .rewrites = (.rewrites | map(select(has("destination"))))
            )
          ' firebase.json > firebase.preview.json
          mv firebase.preview.json firebase.json
      - uses: FirebaseExtended/action-hosting-deploy@73212fc153444869d3e433816aab02624792fcef # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HSM_DASHBOARD }}
          projectId: hsm-dashboard
          target: prod
