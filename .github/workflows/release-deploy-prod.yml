# Production release: one workflow - Cloud Run api-prod, then prod Firebase Hosting (same tag).

name: Release deploy (prod API + Hosting)

on:
  release:
    types:
      - published

permissions:
  contents: read
  id-token: write

concurrency:
  group: prod-release
  cancel-in-progress: false

jobs:
  deploy:
    name: API + Hosting
    runs-on: ubuntu-latest
    environment: production
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_REGION: ${{ vars.GCP_REGION }}
      ARTIFACT_REPOSITORY: ${{ vars.ARTIFACT_REPOSITORY }}
      BACKEND_IMAGE_NAME: ${{ vars.BACKEND_IMAGE_NAME }}
      PROD_SERVICE_NAME: ${{ vars.BACKEND_PROD_SERVICE_NAME }}
      WORKER_PROD_SERVICE_NAME: ${{ vars.BACKEND_WORKER_PROD_SERVICE_NAME || 'worker-prod' }}
      IMAGE_BASE: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.ARTIFACT_REPOSITORY }}/${{ vars.BACKEND_IMAGE_NAME }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - id: auth
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Configure Artifact Registry auth
        run: gcloud auth configure-docker "${GCP_REGION}-docker.pkg.dev" --quiet

      - uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0

      - name: Build and push backend image
        id: build
        uses: docker/build-push-action@ca877d9245402d1537745e0e356eab47c3520991 # v6.13.0
        with:
          context: backend
          file: backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.IMAGE_BASE }}:${{ env.RELEASE_TAG }}

      - id: deploy_api
        name: Deploy Cloud Run (api-prod)
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: ${{ env.PROD_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}
          skip_default_labels: true

      - id: deploy_worker
        name: Deploy Cloud Run (worker-prod)
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3.0.1
        with:
          service: ${{ env.WORKER_PROD_SERVICE_NAME }}
          region: ${{ env.GCP_REGION }}
          project_id: ${{ env.GCP_PROJECT_ID }}
          image: ${{ env.IMAGE_BASE }}@${{ steps.build.outputs.digest }}
          skip_default_labels: true

      - name: Log deployed image
        run: |
          echo "Release tag: ${RELEASE_TAG}"
          echo "Image: ${IMAGE_BASE}@${{ steps.build.outputs.digest }}"
          echo "Service URL: ${{ steps.deploy_api.outputs.url }}"
          echo "Worker URL: ${{ steps.deploy_worker.outputs.url }}"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        env:
          VITE_USE_AUTH_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: hsm-dashboard
          VITE_FIREBASE_AUTH_DOMAIN: hsm-dashboard.firebaseapp.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_TITILER_URL: https://titiler-shared-t566ee45iq-uc.a.run.app
        run: npm ci && npm run build

      - name: Deploy Firebase Hosting (prod -> api-prod)
        uses: FirebaseExtended/action-hosting-deploy@73212fc153444869d3e433816aab02624792fcef # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HSM_DASHBOARD }}
          channelId: live
          projectId: hsm-dashboard
          target: prod
