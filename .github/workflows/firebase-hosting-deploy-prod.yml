# Deploy prod Hosting (hsm-dashboard) from the release tag — same promotion as api-prod.

name: Firebase Hosting Deploy Prod

on:
  release:
    types:
      - published

permissions:
  contents: read

concurrency:
  group: firebase-hosting-prod-deploy
  cancel-in-progress: false

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: refs/tags/${{ env.RELEASE_TAG }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install and build frontend
        working-directory: frontend
        env:
          VITE_USE_AUTH_EMULATOR: "false"
          VITE_FIREBASE_PROJECT_ID: hsm-dashboard
          VITE_FIREBASE_AUTH_DOMAIN: hsm-dashboard.firebaseapp.com
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        run: npm ci && npm run build

      - name: Deploy Hosting (prod → api-prod)
        uses: FirebaseExtended/action-hosting-deploy@73212fc153444869d3e433816aab02624792fcef # v0.10.0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_HSM_DASHBOARD }}
          channelId: live
          projectId: hsm-dashboard
          target: prod
