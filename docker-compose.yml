# Dev stack: backend, frontend, TiTiler, Firebase emulators (Firestore + Auth).
# Backend catalog uses the Firestore emulator (`models` collection); seed via README or export/import.

services:
  firebase-emulators:
    build:
      context: ./docker/firebase-emulators
      dockerfile: Dockerfile
    ports:
      # UI shell loads from 4000, but the SPA also needs Hub + Firestore websocket on the host.
      # Without 4400 / 9150 / 4500 the Firestore tab stays blank (browser talks to localhost, not only 4000).
      - "4000:4000"
      - "4400:4400"
      - "4500:4500"
      - "8085:8085"
      - "9099:9099"
      - "9150:9150"
    volumes:
      - ./firebase.json:/workspace/firebase.json:ro
      - ./.firebaserc:/workspace/.firebaserc:ro
      - ./firestore.rules:/workspace/firestore.rules:ro
      - ./firestore.indexes.json:/workspace/firestore.indexes.json:ro
      # Emulator snapshot from `firebase emulators:export` (see README). Writable so export can write here.
      - ./data/firestore-emulator-seed:/workspace/firestore-seed
      # Speed up restarts: emulator JARs live in ~/.cache/firebase (see Firebase CI docs).
      - firebase_emulator_cache:/root/.cache/firebase
    environment:
      - GCLOUD_PROJECT=hsm-dashboard
    command:
      - sh
      - -c
      - |
        if [ -f /workspace/firestore-seed/firebase-export-metadata.json ]; then
          firebase emulators:start --only firestore,auth --project hsm-dashboard --import=/workspace/firestore-seed
        else
          firebase emulators:start --only firestore,auth --project hsm-dashboard
        fi

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      # Bind-mount source for live reload. Anonymous volume on `.venv` (like `/app/node_modules`
      # on the frontend) hides the host’s `.venv` so macOS shebangs are never used in Linux.
      - ./backend:/app
      - /app/.venv
      - ./data:/data:ro
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=sqlite:///./app.db
      - CATALOG_BACKEND=firestore
      - GOOGLE_CLOUD_PROJECT=hsm-dashboard
      - FIRESTORE_EMULATOR_HOST=firebase-emulators:8085
      # Optional: JSON snapshot instead of Firestore (no emulator needed for catalog):
      # - CATALOG_BACKEND=file
      # - CATALOG_PATH=/data/catalog/firestore_models.json
    depends_on:
      firebase-emulators:
        condition: service_started
    command: >
      sh -c "uv sync --no-dev && uv run uvicorn backend_api.main:app --host 0.0.0.0 --port 8000 --reload"
    healthcheck:
      # Avoid frontend Vite proxying /api before uvicorn is listening (ECONNREFUSED on first paint).
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 120s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      # Vite proxy runs inside this container; use service DNS, not localhost.
      - API_PROXY_TARGET=http://backend:8000
    command: npm run dev -- --host 0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
      titiler:
        condition: service_started

  titiler:
    image: ghcr.io/developmentseed/titiler:latest
    platform: linux/amd64
    ports:
      - "8080:8080"
    volumes:
      - ./data:/data:ro
    environment:
      - TITILER_CACHE_DISABLE=true
      - TITILER_CACHE_TYPE=null
      - GDAL_DISABLE_READDIR_ON_OPEN=FALSE


    command: uvicorn titiler.application.main:app --host 0.0.0.0 --port 8080

volumes:
  firebase_emulator_cache: