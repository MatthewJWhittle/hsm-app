[project]
name = "hsm-core"
version = "0.1.0"
description = "Shared domain and job utilities for HSM backend"
requires-python = ">=3.11"
dependencies = [
    "google-cloud-firestore>=2.19.0",
    "pydantic>=2.11.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hsm_core"]

[tool.ruff]
line-length = 88
target-version = "py311"
