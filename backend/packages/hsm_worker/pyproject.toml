[project]
name = "hsm-worker"
version = "0.1.0"
description = "HSM background worker (Cloud Tasks HTTP target)"
requires-python = ">=3.11"
dependencies = [
    "hsm-api",
    "hsm-core",
    "fastapi[standard]>=0.115.12",
    "uvicorn>=0.34.3",
]

[tool.uv.sources]
hsm-api = { workspace = true }
hsm-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hsm_worker"]

[tool.ruff]
line-length = 88
target-version = "py311"
